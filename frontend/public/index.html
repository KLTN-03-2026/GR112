<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hệ thống tư vấn tuyển sinh thông minh ConsulTing" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>ConsulTing - Smart Admission</title>

    <style>
      /* Cấm Google đẩy trang xuống */
      html, body {
        top: 0px !important;
        margin-top: 0px !important;
        position: static !important;
      }
      /* Tàng hình mọi class của thanh dịch */
      iframe.goog-te-banner-frame,
      .goog-te-banner-frame,
      .VIpgJd-Zvi9od-aZ2wEe-wOHMyf,
      .VIpgJd-Zvi9od-ORHb-OEVmcd,
      #goog-gt-tt { 
        display: none !important; 
        opacity: 0 !important;
        visibility: hidden !important;
        height: 0px !important;
      }
      .goog-text-highlight { 
        background: none !important; 
        box-shadow: none !important; 
      }
    </style>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'vi', 
          includedLanguages: 'en,vi', 
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="google_translate_element" style="display: none;"></div>
    <div id="root"></div>

    <script type="text/javascript">
      setInterval(function() {
        // 1. Ép body và html dính chặt lên top
        document.body.style.top = '0px';
        document.documentElement.style.top = '0px';

        // 2. TÌM VÀ XÓA HẲN (REMOVE) CÁI KHUNG KHỎI TRANG WEB
        var badElements = document.querySelectorAll('.goog-te-banner-frame, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, iframe[id^="goog-"]');
        badElements.forEach(function(el) {
            el.remove(); // Băm nát nó khỏi DOM, không cho cơ hội hiển thị
        });

        // 3. Ẩn chữ "Hiển thị bản gốc"
        var skips = document.querySelectorAll('.skiptranslate');
        skips.forEach(function(skip) {
          if (skip.tagName !== 'BODY' && skip.tagName !== 'HTML') {
             skip.style.display = 'none';
          }
        });
      }, 50);
    </script>
  <body ></body>
</html>
